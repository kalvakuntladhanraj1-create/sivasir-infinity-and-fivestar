<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<title>Legal Report System</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0"><style>
body {
    margin: 0;
    font-family: "Segoe UI", Arial, sans-serif;
    background: linear-gradient(135deg, #eef2f7, #f9fbfd);
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
}

.container {
    text-align: center;
}

h1 {
    margin-bottom: 40px;
    color: #222;
}

.card-wrapper {
    display: flex;
    gap: 30px;
    justify-content: center;
}

.card {
    background: #fff;
    padding: 30px 40px;
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.08);
    cursor: pointer;
    transition: 0.25s;
    width: 220px;
}

.card:hover {
    transform: translateY(-6px);
    box-shadow: 0 15px 35px rgba(0,0,0,0.12);
}

.card h2 {
    margin: 0;
    color: #333;
}

.sale {
    border-top: 5px solid #4f46e5;
}

.gift {
    border-top: 5px solid #10b981;
}
</style></head><body><div class="container"><h1>Legal Report Generator</h1><div class="card-wrapper"><div class="card sale" onclick="goTo('sale')">
<h2>Sale Report</h2>
</div><div class="card gift" onclick="goTo('gift')">
<h2>Gift Report</h2>
</div></div></div><script>
function goTo(type) {
    window.location.href = "/" + type;
}
</script></body>
</html>
